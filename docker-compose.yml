version: "3.9"

services:
  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: khetbazaar-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  # ── Flask ML service ─────────────────────────────────────────────────────────
  flask-ml:
    build:
      context: ./flask-ml
      dockerfile: Dockerfile
    container_name: khetbazaar-flask
    ports:
      - "5001:5001"
    environment:
      - MONGO_URI=mongodb://mongo:27017/khetbazaar
      - FLASK_PORT=5001
    depends_on:
      - mongo
    restart: unless-stopped

  # ── Node.js backend ──────────────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: khetbazaar-server
    ports:
      - "4000:4000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/khetbazaar
      - FLASK_URL=http://flask-ml:5001
      - PORT=4000
      - NODE_ENV=production
    env_file:
      - ./server/.env
    depends_on:
      - mongo
      - flask-ml
    restart: unless-stopped

  # ── React client (dev) ───────────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: khetbazaar-client
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://localhost:4000
    depends_on:
      - server
    restart: unless-stopped

volumes:
  mongo_data:
